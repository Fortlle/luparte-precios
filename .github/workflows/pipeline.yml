name: Pipeline Precios Luparte
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 */20 * *"
  workflow_dispatch:
jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install curl-cffi parsel crawl4ai scrapy scrapy-playwright requests lxml
      - run: python -m playwright install chromium --with-deps
      - run: mkdir -p db
      - name: Ejecutar pipeline
        run: python pipeline/main.py
        env:
          PYTHONPATH: ${{ github.workspace }}/scrapers:${{ github.workspace }}/pipeline
      - name: Leer version
        id: version
        run: echo "version=$(cat db/version.txt)" >> $GITHUB_OUTPUT
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: "precios-${{ steps.version.outputs.version }}"
          name: "Precios ${{ steps.version.outputs.version }}"
          files: db/productos.db db/servicios.db db/version.txt
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
